services:
  - type: web
    name: fresh-fold-api
    runtime: node
    rootDir: fresh-and-fold-backend
    # NODE_ENV=production omits devDependencies by default, but TypeScript and
    # declaration packages are required to compile. Install deterministically
    # for the build, then prune them before the production start command.
    buildCommand: npm ci --include=dev && npm run build && npm prune --omit=dev
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: HTTP_CORS_ORIGINS
        sync: false
      - key: SOCKET_CORS_ORIGINS
        sync: false
      - key: TRUST_PROXY_HOPS
        value: "1"
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: FAST2SMS_API_KEY
        sync: false
      - key: FAST2SMS_OTP_ID
        sync: false
      - key: OTP_DEMO_MODE
        value: "false"
      - key: OTP_DEMO_MOBILE
        sync: false
      - key: OTP_DEMO_CODE
        sync: false
      - key: PORT
        value: "10000"
